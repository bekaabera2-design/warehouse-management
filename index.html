<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Smart Warehouse | Inventory Manager</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-warehouse"></i>
                <h1>Smart<span>Warehouse</span></h1>
            </div>
            <div class="nav-stats">
                <div class="nav-stat">
                    <i class="fas fa-boxes"></i>
                    <span id="totalProducts">0</span>
                    <small>Products</small>
                </div>
                <div class="nav-stat">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="lowStockCount">0</span>
                    <small>Low Stock</small>
                </div>
                <div class="nav-stat">
                    <i class="fas fa-chart-line"></i>
                    <span id="totalValue">$0</span>
                    <small>Inventory Value</small>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-dashboard">
            <!-- Left Panel - Add Product -->
            <div class="panel panel-dark">
                <div class="panel-header">
                    <i class="fas fa-plus-circle"></i>
                    <h2>Register New Product</h2>
                </div>
                <form id="addProductForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-barcode"></i> SKU *</label>
                            <input type="text" id="sku" placeholder="e.g., WH-001" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-tag"></i> Product Name *</label>
                            <input type="text" id="productName" placeholder="Product name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-layer-group"></i> Category</label>
                            <select id="category">
                                <option value="Electronics">Electronics</option>
                                <option value="Safety Equipment">Safety Equipment</option>
                                <option value="Packaging">Packaging</option>
                                <option value="Tools">Tools</option>
                                <option value="Raw Materials">Raw Materials</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-map-marker-alt"></i> Location</label>
                            <input type="text" id="location" placeholder="Aisle, Shelf, Bin">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-box"></i> Current Stock</label>
                            <input type="number" id="currentStock" value="0">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-bell"></i> Reorder Level</label>
                            <input type="number" id="reorderLevel" value="10">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-dollar-sign"></i> Unit Price</label>
                            <input type="number" id="unitPrice" step="0.01" value="0">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-truck"></i> Supplier</label>
                            <input type="text" id="supplier" placeholder="Supplier name">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Add to Inventory
                    </button>
                </form>
            </div>

            <!-- Right Panel - Stock Adjustment -->
            <div class="panel panel-dark">
                <div class="panel-header">
                    <i class="fas fa-exchange-alt"></i>
                    <h2>Stock Adjustment</h2>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-search"></i> Select Product</label>
                    <select id="adjustProductSelect" onchange="loadProductForAdjustment()">
                        <option value="">Choose a product...</option>
                    </select>
                </div>
                <div id="productDetails" class="product-details-preview">
                    <p class="placeholder">Select a product to adjust stock</p>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-plus-circle"></i> Add Stock</label>
                        <input type="number" id="addStock" placeholder="Quantity to add">
                        <button onclick="adjustStock('add')" class="btn-small btn-add">+ Add</button>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-minus-circle"></i> Remove Stock</label>
                        <input type="number" id="removeStock" placeholder="Quantity to remove">
                        <button onclick="adjustStock('remove')" class="btn-small btn-remove">- Remove</button>
                    </div>
                </div>
                <hr class="divider">
                <div class="input-group">
                    <label><i class="fas fa-pen"></i> Update Product Info</label>
                    <input type="text" id="updatePrice" placeholder="New unit price">
                    <input type="number" id="updateReorder" placeholder="New reorder level">
                    <button onclick="updateProductInfo()" class="btn btn-update">
                        <i class="fas fa-sync-alt"></i> Update Information
                    </button>
                </div>
                <button onclick="deleteProduct()" class="btn btn-danger">
                    <i class="fas fa-trash-alt"></i> Delete Product
                </button>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="inventory-section">
            <div class="section-header">
                <h2><i class="fas fa-clipboard-list"></i> Current Inventory</h2>
                <div class="table-controls">
                    <input type="text" id="searchInput" placeholder="Search by SKU or name..." onkeyup="searchProducts()">
                    <select id="categoryFilter" onchange="filterByCategory()">
                        <option value="all">All Categories</option>
                    </select>
                    <button onclick="refreshInventory()" class="btn-refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Stock</th>
                            <th>Reorder Level</th>
                            <th>Status</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <tr><td colspan="9" class="loading">Loading inventory...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Low Stock Alert Banner -->
        <div id="alertBanner" class="alert-banner" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMessage"></span>
            <button onclick="hideAlert()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/js/script.js"></script>
</body>
</html>
